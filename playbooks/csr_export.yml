---
- name: Export CSR from ISE
  hosts: ise_servers
  vars_files:
    - credentials.yml
  gather_facts: false
  tasks:
    # - name: CSR Generate
    #   cisco.ise.csr_generate_intermediate_ca:
    #     ise_hostname: "{{ ise_hostname }}"
    #     ise_username: "{{ ise_username }}"
    #     ise_password: "{{ ise_password }}"
    #     ise_version: "{{ ise_version }}"
    #     ise_verify: "{{ ise_verify }}"
    #     ise_debug: "{{ ise_debug }}"
    #   register: csr_generate_result

    - name: CSR Info
      cisco.ise.csr_info:
        ise_hostname: "{{ ise_hostname }}"
        ise_username: "{{ ise_username }}"
        ise_password: "{{ ise_password }}"
        ise_version: "{{ ise_version }}"
        ise_verify: "{{ ise_verify }}"
        ise_debug: "{{ ise_debug }}"
      register: csr_info_result

    - name: CSR Export (already present)
      cisco.ise.csr_export_info:
        ise_hostname: "{{ ise_hostname }}"
        ise_username: "{{ ise_username }}"
        ise_password: "{{ ise_password }}"
        ise_version: "{{ ise_version }}"
        ise_verify: "{{ ise_verify }}"
        ise_debug: "{{ ise_debug }}"
        hostname: ise
        id: "{{ csr_info_result.ise_responses[0]['id'] }}"
        dirPath: /tmp/certificates/
        saveFile: true
      when:
        - csr_info_result['ise_responses'] | length >= 1
      register: csr_export_info_result

    - name: Print generate result
      ansible.builtin.debug:
        var: csr_export_info_result
      when: csr_export_info_result
